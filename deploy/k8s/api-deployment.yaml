apiVersion: apps/v1
kind: Deployment
metadata:
  name: ontoforge-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ontoforge-api
  template:
    metadata:
      labels:
        app: ontoforge-api
    spec:
      containers:
        - name: api
          image: ontoforge-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: ontoforge-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: ontoforge-api
spec:
  selector:
    app: ontoforge-api
  ports:
    - port: 80
      targetPort: 8000
