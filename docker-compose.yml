services:
  api:
    build: .
    env_file: backend/.env.example
    environment:
      DATABASE_URL: postgresql+psycopg://ontoforge:ontoforge@postgres:5432/ontoforge
      REDIS_URL: redis://redis:6379/0
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: changeme123
      SEARCH_URL: http://opensearch:9200
      SECRET_KEY: change-me-in-production
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
      - neo4j
      - opensearch
    volumes:
      - uploads:/app/data

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ontoforge
      POSTGRES_USER: ontoforge
      POSTGRES_PASSWORD: ontoforge
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  neo4j:
    image: neo4j:5-community
    environment:
      NEO4J_AUTH: neo4j/changeme123
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data

  opensearch:
    image: opensearchproject/opensearch:2
    environment:
      discovery.type: single-node
      plugins.security.disabled: "true"
      OPENSEARCH_INITIAL_ADMIN_PASSWORD: ChangeMe123!
    ports:
      - "9200:9200"
    volumes:
      - opensearch_data:/usr/share/opensearch/data

volumes:
  uploads:
  postgres_data:
  neo4j_data:
  opensearch_data:
